version: 1
glossary:
  - preferred: "wdrożenie"
    aliases:
      - "deploy"
      - "deployment"
    description: "Używaj polskiej formy w artefaktach zespołowych."
  - preferred: "opis PR"
    aliases:
      - "PR description"
    description: "W komunikacji repo-native mówimy o opisie PR."
  - preferred: "release notes"
    aliases:
      - "release note"
      - "changelog dla klienta"
    description: "Dla artefaktu klient-facing zostaje ustalona nazwa angielska."
do_not_translate:
  - "GitHub"
  - "Jira"
  - "Sentry"
  - "CI"
  - "CD"
  - "API"
  - "PR"
  - "feature flag"
banned_phrases:
  - "to tylko drobna zmiana"
  - "wydaje się, że"
  - "prawdopodobnie działa"
artifact_templates:
  pr_description:
    title: "Opis PR"
    sections:
      - "Cel zmiany"
      - "Zakres"
      - "Testy"
      - "Ryzyka"
    instructions: "Pisz zwięźle dla reviewerów technicznych. Nie dopisuj nowych faktów i jasno oddzielaj zakres od ryzyk."
  release_notes:
    title: "Release notes"
    sections:
      - "Najważniejsze zmiany"
      - "Wpływ dla użytkownika"
      - "Ryzyka"
    instructions: "Twórz komunikat gotowy do publikacji wewnętrznej albo klient-facing, bez żargonu niepotrzebnego dla wybranego audience."
  issue:
    title: "Opis zgłoszenia"
    sections:
      - "Kontekst"
      - "Problem"
      - "Kroki odtworzenia"
      - "Oczekiwany rezultat"
      - "Następny krok"
    instructions: "Porządkuj chaotyczne notatki do formy ticketu gotowego dla zespołu."
  rollout_note:
    title: "Notatka rolloutowa"
    sections:
      - "Zakres rolloutu"
      - "Monitoring"
      - "Ryzyka"
      - "Plan wycofania"
    instructions: "Pisz konkretnie operacyjnie. Uwzględniaj monitoring i rollback tylko gdy wynikają ze źródeł."
required_sections:
  pr_description:
    - "Cel zmiany"
    - "Zakres"
    - "Testy"
    - "Ryzyka"
  release_notes:
    - "Najważniejsze zmiany"
    - "Wpływ dla użytkownika"
    - "Ryzyka"
  issue:
    - "Kontekst"
    - "Problem"
    - "Kroki odtworzenia"
    - "Oczekiwany rezultat"
    - "Następny krok"
  rollout_note:
    - "Zakres rolloutu"
    - "Monitoring"
    - "Ryzyka"
    - "Plan wycofania"
audiences:
  reviewer:
    description: "Odbiorca techniczny sprawdzający zmianę w PR. Ceni precyzję, testy, ryzyka i brak marketingowego tonu."
    banned_terms:
      - "wow"
      - "rewolucyjny"
    notes:
      - "Uwzględnij techniczne ryzyka i testy."
  internal:
    description: "Odbiorca wewnętrzny w zespole produktowo-inżynieryjnym. Potrzebuje klarownej notatki do współpracy i koordynacji."
    banned_terms:
      - "rewolucyjny"
    notes:
      - "Możesz użyć skrótów zespołowych tylko jeśli są w źródłach."
  customer:
    description: "Odbiorca klient-facing. Uprość techniczny żargon i mów o wpływie dla użytkownika, ale nie ukrywaj realnych ograniczeń."
    banned_terms:
      - "commit"
      - "branch"
      - "PR"
      - "hotfix"
    notes:
      - "Nie eksponuj wewnętrznych nazw procesów."
  exec:
    description: "Odbiorca decyzyjny. Potrzebuje krótkiej, wysokopoziomowej informacji o statusie, ryzyku i wpływie biznesowym."
    banned_terms:
      - "nit"
      - "refactor-only"
      - "branch"
    notes:
      - "Skup się na wpływie, nie na szczegółach implementacji."
validation:
  preserve_identifiers: true
  require_sections: true
  enforce_no_new_facts: true
  enforce_glossary: true
  require_traceability: true
github:
  repository: "pdurlej/jan-subagent"
  api_base: "https://api.github.com"
jira:
  base_url: ""
  project_keys:
    - "JAN"
